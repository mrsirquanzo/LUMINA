<!-- START OF FILE lumina-scientist-v4.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMINA - Scientist View v4 (Deep Dive)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .gradient-bg {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
    }
    
    /* Professional Glow Animation */
    @keyframes bio-pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 0.9; }
    }
    .risk-active { animation: bio-pulse 2s ease-in-out infinite; }
    
    /* Skin Rash Effect */
    @keyframes skin-rash {
      0%, 100% { filter: drop-shadow(0 0 2px rgba(239, 68, 68, 0.4)); }
      50% { filter: drop-shadow(0 0 6px rgba(239, 68, 68, 0.7)); }
    }
    .skin-risk { animation: skin-rash 3s infinite; }
  </style>
</head>
<body class="gradient-bg min-h-screen text-slate-200">
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState } = React;
    
    // [DATA MODELS SAME AS BEFORE - Keeping them brief for the fix]
    const safetyData = {
      overallRisk: 'Medium',
      risks: [
        { organ: 'skin', level: 'high', score: 78, notes: 'High Nectin-4 expression in keratinocytes. Risk: SJS/TEN.' },
        { organ: 'liver', level: 'medium', score: 45, notes: 'Hepatic clearance of payload. Monitor LFTs.' },
        { organ: 'kidney', level: 'low', score: 30, notes: 'Renal elimination of small molecule format.' },
        { organ: 'marrow', level: 'low', score: 25, notes: 'Neutropenia (MMAE class effect).' },
        { organ: 'heart', level: 'low', score: 12, notes: 'No cardiotoxicity signals.' },
        { organ: 'lung', level: 'none', score: 5, notes: 'Clean pulmonary profile.' },
        { organ: 'gi', level: 'low', score: 22, notes: 'Mild nausea/diarrhea reported.' }
      ],
      aeTable: [
        { event: 'Rash / Pruritus', allGrade: '45%', grade3_4: '8%', related: 'Target (Skin)', comparator: '12% (Lower)' },
        { event: 'Fatigue', allGrade: '38%', grade3_4: '5%', related: 'Both', comparator: '35% (Similar)' },
        { event: 'Nausea', allGrade: '32%', grade3_4: '3%', related: 'Payload', comparator: '28% (Similar)' },
        { event: 'Neutropenia', allGrade: '25%', grade3_4: '12%', related: 'Payload', comparator: '18% (Higher)' },
        { event: 'Peripheral Neuropathy', allGrade: '18%', grade3_4: '4%', related: 'Payload', comparator: '15% (Similar)' },
      ]
    };

    // --- ANATOMICAL BODY COMPONENT (Professional Medical Style) ---
    const AnatomicalBody = () => {
      const [hoveredOrgan, setHoveredOrgan] = useState(null);

      const getRiskColor = (organName) => {
        const risk = safetyData.risks.find(r => r.organ === organName);
        if (!risk) return "fill-slate-700/30"; 
        if (risk.level === 'high') return "fill-red-500/60 stroke-red-400 risk-active";
        if (risk.level === 'medium') return "fill-amber-500/60 stroke-amber-400";
        if (risk.level === 'low') return "fill-emerald-500/40 stroke-emerald-400";
        return "fill-slate-700/30 stroke-slate-600";
      };

      const getSkinClass = () => {
        const skinRisk = safetyData.risks.find(r => r.organ === 'skin');
        return skinRisk?.level === 'high' ? 'skin-risk stroke-red-500/50' : 'stroke-slate-600/50';
      };

      return (
        <div className="h-full flex flex-col">
          <h3 className="text-lg font-semibold text-white mb-6">Anatomical Risk Map</h3>
          <div className="relative flex-1 flex items-center justify-center">
            
            {/* Medical Illustration SVG */}
            <svg viewBox="0 0 200 450" className="h-[400px] w-auto drop-shadow-2xl">
              
              {/* 1. BODY SILHOUETTE (The Skin) */}
              <path 
                d="M100,20 C120,20 130,40 130,55 C130,70 120,80 120,85 L150,110 C170,130 185,180 190,210 C192,220 185,230 175,225 L160,200 L145,170 L145,230 C145,260 140,300 135,320 L130,380 L135,430 C135,440 120,445 110,440 L105,420 L95,420 L90,440 C80,445 65,440 65,430 L70,380 L65,320 C60,300 55,260 55,230 L55,170 L40,200 L25,225 C15,230 8,220 10,210 C15,180 30,130 50,110 L80,85 C80,80 70,70 70,55 C70,40 80,20 100,20 Z"
                fill="none"
                strokeWidth="1.5"
                className={`transition-all duration-500 ${getSkinClass()}`}
                onMouseEnter={() => setHoveredOrgan({ name: 'Skin', risk: 'High', note: 'Target Expression in Keratinocytes' })}
                onMouseLeave={() => setHoveredOrgan(null)}
              />

              {/* 2. INTERNAL ORGANS (Layered like Protein Atlas) */}
              
              {/* Brain */}
              <path d="M85,30 C85,25 95,22 100,22 C105,22 115,25 115,30 C115,45 105,50 100,50 C95,50 85,45 85,30 Z"
                className={`transition-colors duration-300 cursor-pointer ${getRiskColor('brain')}`}
              />

              {/* Lungs */}
              <g className={`transition-colors duration-300 cursor-pointer ${getRiskColor('lung')}`}>
                <path d="M105,100 C105,100 130,105 130,130 C130,155 105,160 105,150 Z" />
                <path d="M95,100 C95,100 70,105 70,130 C70,155 95,160 95,150 Z" />
              </g>

              {/* Heart */}
              <path d="M100,125 C110,120 120,130 115,145 L100,160 L85,145 C80,130 90,120 100,125 Z"
                className={`transition-colors duration-300 cursor-pointer ${getRiskColor('heart')}`}
              />

              {/* Liver */}
              <path d="M80,170 C80,160 120,160 125,175 C125,190 90,195 80,170 Z"
                className={`transition-colors duration-300 cursor-pointer ${getRiskColor('liver')}`}
                onMouseEnter={() => setHoveredOrgan({ name: 'Liver', risk: 'Medium', note: 'Clearance' })}
                onMouseLeave={() => setHoveredOrgan(null)}
              />

              {/* Kidneys */}
              <g className={`transition-colors duration-300 cursor-pointer ${getRiskColor('kidney')}`}
                 onMouseEnter={() => setHoveredOrgan({ name: 'Kidneys', risk: 'Low', note: 'Renal Elimination' })}
                 onMouseLeave={() => setHoveredOrgan(null)}>
                <path d="M115,185 C125,185 125,200 115,200 C110,200 110,185 115,185 Z" />
                <path d="M85,185 C75,185 75,200 85,200 C90,200 90,185 85,185 Z" />
              </g>

              {/* GI Tract */}
              <path d="M90,210 C85,210 85,240 90,245 C100,250 110,240 110,220 C110,210 100,210 90,210 Z"
                className={`transition-colors duration-300 cursor-pointer ${getRiskColor('gi')}`}
              />

              {/* Bone Marrow (Femurs) */}
              <g className={`transition-colors duration-300 cursor-pointer ${getRiskColor('marrow')}`}>
                 <path d="M75,260 L70,360" strokeWidth="8" strokeLinecap="round" className="stroke-current" fill="none"/>
                 <path d="M125,260 L130,360" strokeWidth="8" strokeLinecap="round" className="stroke-current" fill="none"/>
              </g>

            </svg>

            {/* Floating Tooltip */}
            {hoveredOrgan && (
              <div className="absolute bottom-10 bg-slate-900/95 border border-slate-600 p-3 rounded-lg text-xs shadow-xl backdrop-blur-md z-20 w-48 text-center">
                <div className="font-bold text-white mb-1">{hoveredOrgan.name}</div>
                <div className={`font-medium mb-1 ${hoveredOrgan.risk === 'High' ? 'text-red-400' : hoveredOrgan.risk === 'Medium' ? 'text-amber-400' : 'text-emerald-400'}`}>
                  {hoveredOrgan.risk} Risk
                </div>
                <div className="text-slate-400">{hoveredOrgan.note}</div>
              </div>
            )}
          </div>

          {/* Legend */}
          <div className="flex justify-center gap-4 mt-4 text-xs">
            <div className="flex items-center gap-2"><div className="w-3 h-3 bg-red-500/60 rounded"></div><span className="text-slate-400">High Risk</span></div>
            <div className="flex items-center gap-2"><div className="w-3 h-3 bg-amber-500/60 rounded"></div><span className="text-slate-400">Medium Risk</span></div>
            <div className="flex items-center gap-2"><div className="w-3 h-3 bg-emerald-500/60 rounded"></div><span className="text-slate-400">Low Risk</span></div>
          </div>
        </div>
      );
    };

    // --- FIXED AE TABLE COMPONENT ---
    const AdverseEventTable = () => (
      <div className="h-full flex flex-col">
        <h3 className="text-lg font-semibold text-white mb-6">Adverse Events</h3>
        <div className="bg-slate-800/30 rounded-xl border border-slate-700 overflow-hidden flex-1">
          <div className="overflow-auto">
            <table className="w-full text-left text-sm table-fixed">
              <thead className="bg-slate-900/80 text-xs uppercase font-semibold text-slate-400">
                <tr>
                  <th className="px-4 py-3 w-[30%]">Adverse Event</th>
                  <th className="px-4 py-3 w-[15%] text-right leading-tight">All Grade %</th>
                  <th className="px-4 py-3 w-[15%] text-right leading-tight">Grade 3-4 %</th>
                  <th className="px-4 py-3 w-[20%] text-center">Relationship</th>
                  <th className="px-4 py-3 w-[20%] text-right">vs Padcev</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-700/50">
                {safetyData.aeTable.map((row, i) => (
                  <tr key={i} className="hover:bg-slate-700/20 transition-colors">
                    <td className="px-4 py-3 font-medium text-white truncate" title={row.event}>{row.event}</td>
                    <td className="px-4 py-3 text-right text-slate-300">{row.allGrade}</td>
                    <td className={`px-4 py-3 text-right font-bold ${parseInt(row.grade3_4) > 5 ? 'text-red-400' : 'text-emerald-400'}`}>
                      {row.grade3_4}
                    </td>
                    <td className="px-4 py-3 text-center">
                      <span className="px-2 py-1 rounded text-[10px] border border-slate-600 bg-slate-800 text-slate-400">
                        {row.related}
                      </span>
                    </td>
                    <td className="px-4 py-3 text-right text-slate-400 text-xs truncate">{row.comparator}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          
          <div className="p-4 border-t border-slate-700 text-xs text-slate-500">
            * Grade 3-4 events in <span className="text-red-400">red</span> indicate rates >5%
          </div>
        </div>
      </div>
    );

    const SafetyDeepDive = () => (
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 h-[600px]">
        <div className="bg-slate-800/50 rounded-xl p-6 border border-slate-700">
          <AnatomicalBody />
        </div>
        <div className="bg-slate-800/50 rounded-xl p-6 border border-slate-700">
          <AdverseEventTable />
        </div>
      </div>
    );

    // [KEEP OTHER COMPONENTS: ValidationDeepDive, SequenceDeepDive, etc.]
    // For brevity, I'm wrapping the SafetyDeepDive in the main view logic below
    
    const LuminaScientistView = () => {
      return (
        <div className="min-h-screen pb-24 p-8 max-w-7xl mx-auto">
           {/* Simplified Header for Demo */}
           <div className="mb-8">
             <h1 className="text-2xl font-bold text-white">Safety & Toxicity Profile</h1>
             <p className="text-slate-400">Anatomical distribution of risk and clinical adverse event data</p>
           </div>
           
           <SafetyDeepDive />
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<LuminaScientistView />);
  </script>
</body>
</html>
