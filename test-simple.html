<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .box {
      background: white;
      color: #333;
      padding: 20px;
      border-radius: 10px;
      margin: 20px 0;
    }
    button {
      background: #4CAF50;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>
  <h1>✅ HTML File Loading Test</h1>

  <div class="box">
    <h2>If you can see this, your HTML file is loading correctly!</h2>
    <p>Browser: <span id="browser"></span></p>
    <p>Current time: <span id="time"></span></p>
  </div>

  <div class="box">
    <h3>JavaScript Test:</h3>
    <button onclick="testClick()">Click Me!</button>
    <p id="result"></p>
  </div>

  <script>
    // Detect browser
    document.getElementById('browser').textContent = navigator.userAgent.includes('Chrome') ? 'Chrome ✓' : navigator.userAgent;

    // Show current time
    document.getElementById('time').textContent = new Date().toLocaleString();

    // Test click handler
    function testClick() {
      document.getElementById('result').textContent = '🎉 JavaScript is working! Ready to test the full demo.';
      document.getElementById('result').style.color = 'green';
      document.getElementById('result').style.fontSize = '18px';
      document.getElementById('result').style.fontWeight = 'bold';
    }
  </script>
</body>
</html>
